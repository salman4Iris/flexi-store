<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" role="img" aria-labelledby="title desc">
  <title id="title">Book collection</title>
  <desc id="desc">Stylized stack of books on a slate blue background.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e0e7ff"/>
      <stop offset="100%" stop-color="#a5b4fc"/>
    </linearGradient>
  </defs>
  <rect width="800" height="800" rx="48" fill="url(#bg)"/>
  <circle cx="400" cy="390" r="240" fill="#eef2ff"/>
  <rect x="220" y="470" width="360" height="55" rx="14" fill="#1e3a8a"/>
  <rect x="250" y="405" width="320" height="55" rx="14" fill="#c2410c"/>
  <rect x="280" y="340" width="290" height="55" rx="14" fill="#065f46"/>
  <rect x="315" y="275" width="255" height="55" rx="14" fill="#7c3aed"/>
  <text x="50%" y="710" text-anchor="middle" font-family="Arial, sans-serif" font-size="42" fill="#3730a3">Books</text>
</svg>